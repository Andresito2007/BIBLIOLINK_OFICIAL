<app-navegacion></app-navegacion>
<div class="container mt-4">
  <h2 class="mb-4">MIS PRESTAMOS</h2>
  <!-- prestamos() y lo llamamos como una funcion -->
  <!--SI NO HAY PRESTAMOS MUESTRA ESTP-->
  <div *ngIf="prestamos().length === 0" class="alert alert-info text-center py-4">
    <p class="mb-0 fs-5">NO CUENTAS CON PRESTAMOS</p>
    <a routerLink="/prestamos" class="btn btn-primary mt-3">SOLICITAR UN PRESTAMO</a>
  </div>

  <div *ngIf="prestamos().length > 0" class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>LIBRO</th>
          <th>DNI</th>
          <th>NOMBRE</th>
          <th>APELLIDO</th>
          <th>FECHA</th>
          <th>DURACION</th>
          <th>DEVOLUCION</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of prestamos()">
          <td>{{ p.libro }}</td>
          <td>{{ p.dni }}</td>
          <td>{{ p.nombre }}</td>
          <td>{{ p.apellido }}</td>
          <!--nuestro pipe date-->
          <!--el pipe es un transformador visual va a agarrar nuestro dato y lo va mostrar bonito-->
          <td>{{ p.fecha | date:'dd/MM/yyyy' }}</td>
          <td>{{ p.duracion }} dias</td>
          <td>{{ p.fechaDevolucion | date:'dd/MM/yyyy' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
